name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mattrmindr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://test:test@localhost:5432/mattrmindr_test
      NODE_ENV: test
      SESSION_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Initialize database schema
        working-directory: server
        run: node schema.js

      - name: Run database migrations
        working-directory: server
        run: npm run migrate:up

      - name: Run tests
        working-directory: server
        run: npx jest --forceExit --detectOpenHandles --runInBand --coverage --coverageReporters=text
